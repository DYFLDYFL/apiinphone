<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="./assets/katex/katex.min.css" />
  <script src="./assets/marked/marked.min.js"></script>
  <script src="./assets/katex/katex.min.js"></script>
  <style>
    body.light {
      --chat-bg: #eef2f7;
      --panel: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --user: #dbeafe;
      --assistant-bg: #ffffff;
      --assistant-text: #1f2937;
      --accent: #2563eb;
      --border: #e5e7eb;
      --code-bg: #f3f4f6;
      --code-text: #1f2937;
      --table-border: #e5e7eb;
      --blockquote-bg: #f9fafb;
      --blockquote-border: #dbeafe;
      --hr: #e5e7eb;
      --error: #dc2626;
      --shadow: rgba(15, 23, 42, 0.06);
      --reasoning-bg: #f8fafc;
    }
    body.dark {
      --chat-bg: #1e293b;
      --panel: #334155;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --user: #1e3a5f;
      --assistant-bg: #334155;
      --assistant-text: #f1f5f9;
      --accent: #60a5fa;
      --border: #475569;
      --code-bg: #0f172a;
      --code-text: #e2e8f0;
      --table-border: #475569;
      --blockquote-bg: #1e293b;
      --blockquote-border: #3b82f6;
      --hr: #475569;
      --error: #f87171;
      --shadow: rgba(0, 0, 0, 0.22);
      --reasoning-bg: #1e293b;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0; height: 100%;
      background: var(--chat-bg);
      color: var(--text);
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      font-size: 14px; line-height: 1.55;
    }
    #messages {
      padding: 16px 20px 24px;
      display: flex; flex-direction: column; gap: 14px;
      background: var(--chat-bg);
    }
    .msg {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px 14px;
      max-width: 100%;
      overflow-x: auto;
      word-break: break-word;
    }
    .msg.user {
      background: var(--user);
      color: var(--text);
      align-self: flex-end;
      max-width: 92%;
    }
    .msg.assistant {
      background: var(--assistant-bg) !important;
      color: var(--assistant-text) !important;
      align-self: stretch;
      box-shadow: 0 1px 2px var(--shadow);
    }
    .msg.system {
      background: var(--panel);
      color: var(--muted);
      font-size: 12px;
    }
    .role {
      font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--accent); margin-bottom: 6px;
    }
    .msg.assistant .role { color: var(--accent); }
    .reasoning-block {
      display: none;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--reasoning-bg);
      overflow: hidden;
    }
    .reasoning-block.is-active {
      display: block;
    }
    .reasoning-block > summary {
      list-style: none;
      cursor: pointer;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      border-bottom: 1px solid transparent;
      user-select: none;
    }
    .reasoning-block.is-active > summary {
      border-bottom-color: var(--border);
    }
    .reasoning-block > summary::-webkit-details-marker {
      display: none;
    }
    .reasoning-block > summary::before {
      content: "▸ ";
      color: var(--muted);
    }
    .reasoning-block[open] > summary::before {
      content: "▾ ";
    }
    .reasoning-status {
      font-weight: 500;
      color: var(--muted);
      margin-left: 6px;
    }
    .reasoning-body {
      max-height: min(42vh, 420px);
      overflow: auto;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
      white-space: pre-wrap;
      line-height: 1.5;
      font-family: Consolas, "Cascadia Code", "Microsoft YaHei UI", sans-serif;
    }
    .reasoning-body.rich {
      white-space: normal;
      font-family: "Segoe UI", "Microsoft YaHei UI", sans-serif;
      color: var(--text);
    }
    .reasoning-body.rich p { margin: 0.35em 0; }
    .reasoning-body.rich pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 8px;
      border-radius: 6px;
      overflow-x: auto;
      font-size: 12px;
    }
    .reasoning-body.rich code {
      font-family: Consolas, "Cascadia Code", monospace;
      background: var(--code-bg);
      padding: 0 0.15em;
      border-radius: 4px;
    }
    .reasoning-block.thinking > summary .reasoning-status::after {
      content: "思考中…";
    }
    .reasoning-block.thinking .reasoning-body::after {
      content: "▋";
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }
    .tools-block {
      display: block;
      margin-bottom: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--reasoning-bg);
      overflow: hidden;
    }
    .tools-block > summary {
      list-style: none;
      cursor: pointer;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      user-select: none;
    }
    .tools-block > summary::-webkit-details-marker {
      display: none;
    }
    .tools-block > summary::before {
      content: "▸ ";
      color: var(--muted);
    }
    .tools-block[open] > summary::before {
      content: "▾ ";
    }
    .tools-block.waiting > summary::after {
      content: " · 联网中…";
      font-weight: 500;
      color: var(--muted);
    }
    .tools-body {
      max-height: min(28vh, 220px);
      overflow: auto;
      border-top: 1px solid var(--border);
    }
    .tools-list {
      list-style: none;
      margin: 0;
      padding: 8px 10px;
    }
    .tool-item {
      font-size: 12px;
      color: var(--muted);
      padding: 6px 0;
      line-height: 1.45;
      word-break: break-word;
      border-bottom: 1px solid var(--border);
    }
    .tool-item:last-child {
      border-bottom: 0;
    }
    .tool-head {
      white-space: pre-wrap;
    }
    .tool-result {
      margin-top: 6px;
    }
    .tool-result > summary {
      cursor: pointer;
      font-size: 11px;
      color: var(--accent);
      user-select: none;
      list-style: none;
    }
    .tool-result > summary::-webkit-details-marker {
      display: none;
    }
    .tool-result > summary::before {
      content: "▸ ";
      color: var(--muted);
    }
    .tool-result[open] > summary::before {
      content: "▾ ";
    }
    .tool-result-body {
      margin-top: 6px;
      max-height: min(36vh, 320px);
      overflow: auto;
      font-size: 12px;
      color: var(--text);
    }
    .tool-query {
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .search-hit {
      padding: 8px 0;
      border-top: 1px solid var(--border);
    }
    .search-hit:first-of-type {
      border-top: 0;
    }
    .search-hit a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      line-height: 1.4;
    }
    .search-hit a:hover {
      text-decoration: underline;
    }
    .search-url {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
      word-break: break-all;
    }
    .search-snippet {
      margin-top: 4px;
      color: var(--text);
      line-height: 1.45;
    }
    .tool-fetch-body {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-family: Consolas, "Cascadia Code", "Microsoft YaHei UI", sans-serif;
      font-size: 11px;
      background: var(--code-bg);
      color: var(--code-text);
      padding: 8px;
      border-radius: 6px;
      border: 1px solid var(--border);
    }
    .sources-block {
      display: block;
      margin-top: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--reasoning-bg);
      overflow: hidden;
    }
    .sources-block > summary {
      list-style: none;
      cursor: pointer;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      user-select: none;
    }
    .sources-block > summary::-webkit-details-marker {
      display: none;
    }
    .sources-block > summary::before {
      content: "▸ ";
      color: var(--muted);
    }
    .sources-block[open] > summary::before {
      content: "▾ ";
    }
    .sources-body {
      max-height: min(28vh, 220px);
      overflow: auto;
      padding: 0 10px 10px;
      border-top: 1px solid var(--border);
    }
    .sources-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .sources-list li {
      font-size: 12px;
      padding: 5px 0;
      line-height: 1.45;
      border-top: 1px solid var(--border);
    }
    .sources-list li:first-child {
      border-top: 0;
    }
    .source-idx {
      font-weight: 700;
      color: var(--accent);
      margin-right: 4px;
    }
    .sources-list a.source-title {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    .sources-list a.source-title:hover {
      text-decoration: underline;
    }
    .source-url {
      display: block;
      margin-top: 2px;
      padding-left: 1.75em;
      font-size: 11px;
      color: var(--muted);
      word-break: break-all;
    }
    a.cite-link {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a.cite-link:hover {
      text-decoration: underline;
    }
    .tool-item.running {
      color: var(--accent);
    }
    .tool-item.running::before {
      content: "▸ ";
    }
    .tool-item.done::before {
      content: "✓ ";
      color: #16a34a;
    }
    .tool-item.error::before {
      content: "✗ ";
      color: var(--error);
    }
    .tool-item.error {
      color: var(--error);
    }
    .msg.assistant .content,
    .msg.assistant .content.plain {
      background: transparent;
      color: var(--assistant-text);
    }
    .msg.assistant .content.plain {
      white-space: pre-wrap;
      line-height: 1.5;
    }
    .msg.assistant hr {
      border: 0;
      height: 1px;
      background: var(--hr);
      margin: 14px 0;
    }
    .content img {
      max-width: 100%; height: auto; border-radius: 8px;
      margin: 8px 0; display: block;
      border: 1px solid var(--border);
    }
    .content pre {
      background: var(--code-bg);
      color: var(--code-text);
      padding: 10px; border-radius: 8px; overflow-x: auto;
      border: 1px solid var(--border);
    }
    .content code {
      font-family: Consolas, "Cascadia Code", monospace;
      font-size: 13px;
      background: var(--code-bg);
      color: var(--code-text);
      padding: 0 0.15em;
      border-radius: 4px;
    }
    .content pre code { background: transparent; padding: 0; border: none; }
    .content p { margin: 0.35em 0; }
    .content h1, .content h2, .content h3, .content h4 {
      margin: 0.6em 0 0.3em;
      color: inherit;
      background: transparent;
    }
    .content table { border-collapse: collapse; margin: 8px 0; width: 100%; }
    .content th, .content td {
      border: 1px solid var(--table-border);
      padding: 6px 10px;
      vertical-align: middle;
      background: transparent;
      color: inherit;
    }
    .msg.assistant .content blockquote {
      margin: 0.4em 0;
      padding: 0.4em 0.8em;
      border-left: 3px solid var(--blockquote-border);
      background: var(--blockquote-bg);
      color: inherit;
    }
    .content .katex { font-size: 1.05em; color: inherit; }
    .content .katex-display {
      margin: 0.55em 0;
      overflow-x: auto;
      overflow-y: visible;
      background: transparent;
    }
    .content.plain { white-space: pre-wrap; line-height: 1.5; }
    .msg.assistant.typing .content.plain:empty::before {
      content: "等待输出…";
      color: var(--muted);
    }
    .msg.assistant.typing .content.plain:not(:empty)::after {
      content: "▋";
      animation: blink 1s step-end infinite;
      color: var(--accent);
    }
    @keyframes blink { 50% { opacity: 0; } }
    .error { color: var(--error); }
    .katex-error { color: var(--error); font-family: Consolas, monospace; font-size: 12px; }
  </style>
</head>
<body class="light">
  <div id="messages"></div>
  <script>
    const container = document.getElementById("messages");
    marked.setOptions({ breaks: true, gfm: true });

    const mathPattern = /\$\$([\s\S]+?)\$\$|\\\[([\s\S]+?)\\\]|\\\((.+?)\\\)|(?<!\$)\$(?!\$)([^\$\n]+?)(?<!\$)\$(?!\$)/g;

    function renderKatex(latex, displayMode) {
      if (typeof katex === "undefined") {
        return displayMode ? "$$" + latex + "$$" : "$" + latex + "$";
      }
      try {
        return katex.renderToString(latex.trim(), {
          throwOnError: false,
          displayMode: displayMode,
          strict: "ignore",
        });
      } catch (e) {
        return '<span class="katex-error">' + latex + "</span>";
      }
    }

    function renderMarkdownWithMath(text) {
      const source = text || "";
      let html = "";
      let last = 0;
      mathPattern.lastIndex = 0;
      let match;
      while ((match = mathPattern.exec(source)) !== null) {
        if (match.index > last) {
          html += marked.parse(source.slice(last, match.index));
        }
        if (match[1] != null) {
          html += renderKatex(match[1], true);
        } else if (match[2] != null) {
          html += renderKatex(match[2], true);
        } else if (match[3] != null) {
          html += renderKatex(match[3], false);
        } else if (match[4] != null) {
          html += renderKatex(match[4], false);
        }
        last = match.index + match[0].length;
      }
      if (last < source.length) {
        html += marked.parse(source.slice(last));
      }
      return html;
    }

    function renderBareLatexInCode(el) {
      el.querySelectorAll("pre code, code").forEach((code) => {
        const text = (code.textContent || "").trim();
        if (!/\\[a-zA-Z]+/.test(text)) return;
        if (code.closest(".katex")) return;
        try {
          const span = document.createElement("span");
          span.innerHTML = renderKatex(text, /\\begin\{/.test(text));
          code.replaceWith(span);
        } catch (e) {}
      });
    }

    function regexEsc(s) {
      return String(s || "").replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normalizeUrl(url) {
      try {
        const u = new URL(url);
        u.hash = "";
        let href = u.href;
        if (href.endsWith("/")) href = href.slice(0, -1);
        return href.toLowerCase();
      } catch {
        return String(url || "")
          .trim()
          .toLowerCase()
          .replace(/\/$/, "");
      }
    }

    function buildSourceMaps(sources) {
      const byNum = new Map();
      const byUrl = new Map();
      (sources || []).forEach((s) => {
        byNum.set(Number(s.n), s.url);
        byUrl.set(normalizeUrl(s.url), Number(s.n));
      });
      return { byNum, byUrl };
    }

    /** Turn [标题](url) into [n] before Markdown, when url/title match search hits. */
    function preprocessMarkdownCitations(text, sources) {
      if (!sources || !sources.length) return text || "";
      let out = text || "";
      const sorted = sources.slice().sort((a, b) => b.title.length - a.title.length);
      for (const s of sorted) {
        const n = s.n;
        const title = regexEsc(s.title);
        const url = regexEsc(s.url);
        if (title && url) {
          out = out.replace(
            new RegExp("\\[" + title + "\\]\\(" + url + "\\)", "gi"),
            "[" + n + "]",
          );
        }
      }
      out = out.replace(/【(\d{1,3})】/g, "[$1]");
      out = out.replace(/［(\d{1,3})］/g, "[$1]");
      return out;
    }

    function decorateContent(el, text, typing, sources) {
      el.dataset.rawMarkdown = text || "";
      if (typing) {
        el.className = "content plain";
        el.textContent = text || "";
        return;
      }
      el.className = "content";
      const md = preprocessMarkdownCitations(text, sources);
      el.innerHTML = renderMarkdownWithMath(md);
      renderBareLatexInCode(el);
      el.querySelectorAll("img").forEach((img) => {
        img.loading = "lazy";
        img.onerror = () => { img.alt = "图片加载失败"; };
      });
      el.querySelectorAll("a").forEach((a) => {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });
    }

    window.setTheme = function(theme) {
      document.body.classList.toggle("light", theme === "light");
      document.body.classList.toggle("dark", theme !== "light");
    };

    window.clearMessages = function() {
      container.innerHTML = "";
    };

    function ensureReasoningBlock(parent) {
      let block = parent.querySelector(".reasoning-block");
      if (block) return block;
      block = document.createElement("details");
      block.className = "reasoning-block";
      block.open = true;
      const summary = document.createElement("summary");
      summary.innerHTML = '思考链<span class="reasoning-status"></span>';
      const body = document.createElement("div");
      body.className = "reasoning-body";
      block.appendChild(summary);
      block.appendChild(body);
      const content = parent.querySelector(".content");
      parent.insertBefore(block, content);
      return block;
    }

    function renderReasoningBody(body, text, reasoningTyping) {
      const trimmed = (text || "").trim();
      if (reasoningTyping && !trimmed) {
        body.className = "reasoning-body";
        body.textContent = "正在连接模型，等待思考输出…";
        return;
      }
      if (reasoningTyping) {
        body.className = "reasoning-body";
        body.textContent = text || "";
        return;
      }
      body.className = "reasoning-body rich";
      body.innerHTML = renderMarkdownWithMath(text || "");
      renderBareLatexInCode(body);
      body.querySelectorAll("a").forEach((a) => {
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });
    }

    function setReasoningBlock(parent, reasoning, reasoningTyping) {
      const text = (reasoning || "").trim();
      const active = reasoningTyping || text;
      const existing = parent.querySelector(".reasoning-block");
      if (!active) {
        if (existing) existing.remove();
        return;
      }
      const block = ensureReasoningBlock(parent);
      block.style.display = "";
      block.classList.add("is-active");
      block.classList.toggle("thinking", !!reasoningTyping);
      block.open = true;
      const body = block.querySelector(".reasoning-body");
      renderReasoningBody(body, reasoning || "", !!reasoningTyping);
      const status = block.querySelector(".reasoning-status");
      if (status && text && !reasoningTyping) {
        status.textContent = "（" + text.length + " 字）";
      } else if (status) {
        status.textContent = "";
      }
      if (reasoningTyping) {
        body.scrollTop = body.scrollHeight;
      }
    }

    function escapeHtml(text) {
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function resultSummaryLabel(name) {
      if (name === "web_search") return "查看搜索结果";
      if (name === "web_fetch") return "查看网页正文";
      if (name === "run_python") return "查看运行输出";
      return "查看返回内容";
    }

    function formatWebSearchHtml(text) {
      const parts = [];
      const queryM = text.match(/^query:\s*(.+)$/m);
      if (queryM) {
        parts.push(
          '<div class="tool-query">关键词：' + escapeHtml(queryM[1].trim()) + "</div>",
        );
      }
      const lines = text.split("\n");
      for (let i = 0; i < lines.length; i++) {
        const bracket = lines[i].match(/^\s*\[(\d+)\]\s+(.+)$/);
        const legacy = lines[i].match(/^\s*(\d+)\.\s+(.+)$/);
        const n = bracket ? bracket[1] : legacy ? legacy[1] : "";
        const title = (bracket?.[2] ?? legacy?.[2])?.trim();
        if (!title) continue;
        const urlLine = (lines[i + 1] || "").trim().replace(/^URL:\s*/i, "");
        const url = urlLine;
        if (!url.startsWith("http://") && !url.startsWith("https://")) continue;
        let snippet = "";
        let consumed = 2;
        const maybeSnippet = (lines[i + 2] || "").trim();
        if (
          maybeSnippet &&
          !isHitStartLine(maybeSnippet) &&
          !maybeSnippet.startsWith("http://") &&
          !maybeSnippet.startsWith("https://")
        ) {
          snippet = maybeSnippet.startsWith("摘要:")
            ? maybeSnippet.slice(3).trim()
            : maybeSnippet;
          consumed = 3;
        }
        i += consumed - 1;
        const idx = n ? "[" + n + "] " : "";
        parts.push(
          '<div class="search-hit">' +
            '<span class="source-idx">' + escapeHtml(idx) + "</span>" +
            '<a href="' + escapeHtml(url) + '" target="_blank" rel="noopener noreferrer">' +
            escapeHtml(title) + "</a>" +
            '<div class="search-url">' + escapeHtml(url) + "</div>" +
            (snippet
              ? '<div class="search-snippet">' + escapeHtml(snippet) + "</div>"
              : "") +
            "</div>",
        );
      }
      if (parts.length <= (queryM ? 1 : 0)) {
        return (
          '<pre class="tool-fetch-body">' + escapeHtml(text.slice(0, 12000)) + "</pre>"
        );
      }
      return '<div class="search-results">' + parts.join("") + "</div>";
    }

    function formatToolResultHtml(name, result) {
      const text = (result || "").trim();
      if (!text) return "";
      if (name === "web_search") return formatWebSearchHtml(text);
      return '<pre class="tool-fetch-body">' + escapeHtml(text.slice(0, 12000)) + "</pre>";
    }

    function renderToolItem(tool) {
      const li = document.createElement("li");
      li.className = "tool-item " + (tool.status || "done");
      const head = document.createElement("div");
      head.className = "tool-head";
      head.textContent = tool.label || tool.name || "工具";
      li.appendChild(head);
      const result = (tool.result || "").trim();
      if (result && tool.status !== "running") {
        const details = document.createElement("details");
        details.className = "tool-result";
        const summary = document.createElement("summary");
        summary.textContent = resultSummaryLabel(tool.name || "");
        const body = document.createElement("div");
        body.className = "tool-result-body";
        body.innerHTML = formatToolResultHtml(tool.name || "", result);
        details.appendChild(summary);
        details.appendChild(body);
        li.appendChild(details);
      }
      return li;
    }

    function setSourcesBlock(parent, sources) {
      const existing = parent.querySelector(".sources-block");
      if (!sources || !sources.length) {
        if (existing) existing.remove();
        return;
      }
      const wasOpen = existing?.open === true;
      if (existing) existing.remove();
      const block = document.createElement("details");
      block.className = "sources-block";
      block.open = wasOpen;
      const summary = document.createElement("summary");
      summary.textContent = "参考来源（" + sources.length + "）";
      const body = document.createElement("div");
      body.className = "sources-body";
      const list = document.createElement("ul");
      list.className = "sources-list";
      sources.forEach((s) => {
        const li = document.createElement("li");
        const idx = document.createElement("span");
        idx.className = "source-idx";
        idx.textContent = "[" + s.n + "]";
        const link = document.createElement("a");
        link.className = "source-title";
        link.href = s.url;
        link.target = "_blank";
        link.rel = "noopener noreferrer";
        link.textContent = s.title || s.url;
        const urlEl = document.createElement("span");
        urlEl.className = "source-url";
        urlEl.textContent = s.url;
        li.appendChild(idx);
        li.appendChild(link);
        li.appendChild(urlEl);
        list.appendChild(li);
      });
      body.appendChild(list);
      block.appendChild(summary);
      block.appendChild(body);
      parent.appendChild(block);
    }

    function isHitStartLine(line) {
      return /^\s*\[\d+\]\s/.test(line) || /^\s*\d+\.\s/.test(line);
    }

    function applyCitationLinks(contentEl, sources) {
      if (!sources || !sources.length || !contentEl) return;
      if (contentEl.classList.contains("plain")) return;
      const { byNum, byUrl } = buildSourceMaps(sources);

      contentEl.querySelectorAll("a").forEach((a) => {
        if (a.classList.contains("cite-link")) return;
        const href = a.getAttribute("href") || "";
        const n = byUrl.get(normalizeUrl(href));
        if (n == null) return;
        a.textContent = "[" + n + "]";
        a.classList.add("cite-link");
        a.href = byNum.get(n) || href;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
      });

      const linkify = (text) =>
        text.replace(/\[(\d{1,3})\]/g, function (match, num) {
          const url = byNum.get(Number(num));
          if (!url) return match;
          return (
            '<a href="' +
            escapeHtml(url) +
            '" class="cite-link" target="_blank" rel="noopener noreferrer">[' +
            num +
            "]</a>"
          );
        });

      const walker = document.createTreeWalker(
        contentEl,
        NodeFilter.SHOW_TEXT,
        {
          acceptNode(node) {
            const p = node.parentElement;
            if (!p) return NodeFilter.FILTER_REJECT;
            const tag = p.tagName;
            if (tag === "A" || tag === "CODE" || tag === "PRE") {
              return NodeFilter.FILTER_REJECT;
            }
            return NodeFilter.FILTER_ACCEPT;
          },
        },
      );
      const textNodes = [];
      while (walker.nextNode()) textNodes.push(walker.currentNode);
      textNodes.forEach((node) => {
        const text = node.textContent || "";
        if (!/\[\d{1,3}\]/.test(text)) return;
        const span = document.createElement("span");
        span.innerHTML = linkify(text);
        if (span.innerHTML !== text) node.replaceWith(...span.childNodes);
      });
    }

    function renderAssistantContent(contentEl, text, typing, sources) {
      decorateContent(contentEl, text, typing, sources);
      if (!typing && sources && sources.length) {
        applyCitationLinks(contentEl, sources);
      }
    }

    function setToolsBlock(parent, tools, active) {
      const items = Array.isArray(tools) ? tools : [];
      const existing = parent.querySelector(".tools-block");
      if (!items.length) {
        if (existing) existing.remove();
        return;
      }
      const wasOpen = existing?.open === true;
      const isWaiting = !!active && items.some((t) => t.status === "running");
      if (existing) existing.remove();

      const block = document.createElement("details");
      block.className = "tools-block";
      if (isWaiting) block.classList.add("waiting");
      block.open = wasOpen || isWaiting;

      const summary = document.createElement("summary");
      summary.textContent = "工具调用（" + items.length + "）";

      const body = document.createElement("div");
      body.className = "tools-body";
      const list = document.createElement("ul");
      list.className = "tools-list";
      items.forEach((tool) => {
        list.appendChild(renderToolItem(tool));
      });
      body.appendChild(list);
      block.appendChild(summary);
      block.appendChild(body);

      const content = parent.querySelector(".content");
      parent.insertBefore(block, content);
    }

    window.appendMessage = function(role, text, options) {
      options = options || {};
      const wrap = document.createElement("div");
      wrap.className = "msg " + role + (options.typing ? " typing" : "");
      const roleEl = document.createElement("div");
      roleEl.className = "role";
      roleEl.textContent = role === "user" ? "你" : role === "assistant" ? "助手" : "系统";
      const content = document.createElement("div");
      content.className = "content";
      if (options.rawHtml) {
        content.innerHTML = text;
      } else if (options.plain) {
        content.className = "content plain";
        content.textContent = text;
      } else {
        renderAssistantContent(content, text, false, options.sources);
      }
      wrap.appendChild(roleEl);
      wrap.appendChild(content);
      if (role === "assistant" && options.reasoning) {
        setReasoningBlock(wrap, options.reasoning, false);
      }
      if (role === "assistant" && options.tools && options.tools.length) {
        setToolsBlock(wrap, options.tools, false);
      }
      if (role === "assistant" && options.sources && options.sources.length) {
        setSourcesBlock(wrap, options.sources);
      }
      container.appendChild(wrap);
      window.scrollToBottom();
      return wrap;
    };

    window.updateLastAssistant = function(text, typing, reasoning, reasoningTyping) {
      let nodes = container.querySelectorAll(".msg.assistant");
      let last = nodes[nodes.length - 1];
      if (!last) {
        last = window.appendMessage("assistant", "", { typing: !!typing });
      }
      last.classList.toggle("typing", !!typing);
      setReasoningBlock(last, reasoning, reasoningTyping);
      if (!reasoningTyping && (reasoning || "").trim()) {
        const block = last.querySelector(".reasoning-block");
        if (block) block.classList.remove("thinking");
      }
      const content = last.querySelector(".content");
      const sources = last._citationSources || null;
      renderAssistantContent(content, text, !!typing, sources);
      window.scrollToBottom();
    };

    window.updateLastAssistantTools = function(tools, active) {
      let nodes = container.querySelectorAll(".msg.assistant");
      let last = nodes[nodes.length - 1];
      if (!last) {
        last = window.appendMessage("assistant", "", {});
      }
      setToolsBlock(last, tools, !!active);
      window.scrollToBottom();
    };

    window.updateLastAssistantSources = function(sources) {
      let nodes = container.querySelectorAll(".msg.assistant");
      let last = nodes[nodes.length - 1];
      if (!last) return;
      last._citationSources = sources || [];
      setSourcesBlock(last, sources);
      const content = last.querySelector(".content");
      const raw = content.dataset.rawMarkdown || "";
      renderAssistantContent(content, raw, false, sources);
      window.scrollToBottom();
    };

    window.showError = function(text) {
      window.appendMessage("system", text, { plain: true });
      const last = container.lastElementChild;
      if (last) last.querySelector(".content").classList.add("error");
    };

    window.scrollToBottom = function() {
      requestAnimationFrame(() => {
        window.scrollTo(0, document.body.scrollHeight);
      });
    };
  </script>
</body>
</html>
